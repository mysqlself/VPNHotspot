name: 编译 VPNHotspot APK (纯净无警告·最终版)

on:
  workflow_dispatch:  # 👈 这里修正了，加上了冒号
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 授权 Gradle
        run: chmod +x gradlew

      - name: 构建 APK
        run: ./gradlew :mobile:assembleDebug

      - name: 上传构建产物
        uses: actions/upload-artifact@v5.0.0
        with:
          name: VPNHotspot-APK
          path: mobile/build/outputs/apk/debug/*.apk

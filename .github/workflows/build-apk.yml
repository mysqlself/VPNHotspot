name: 自动编译 VPNHotspot APK (修复版)

on:
  workflow_dispatch:  # 手动触发
  push:
    branches: [ main ]  # 提交代码自动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码 (最新版，支持Node24)
        uses: actions/checkout@v5

      - name: 设置 JDK 17 (最新版，支持Node24)
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 给 Gradle 执行权限
        run: chmod +x gradlew

      - name: 编译 Debug 版 APK (适配VPNHotspot项目结构)
        run: ./gradlew :mobile:assembleDebug

      - name: 上传 APK (修复正确路径)
        uses: actions/upload-artifact@v4.6.0
        with:
          name: VPNHotspot-Debug-APK
          path: mobile/build/outputs/apk/debug/*.apk

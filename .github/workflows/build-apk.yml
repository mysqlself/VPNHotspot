name: 自动编译 VPNHotspot APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # 允许手动点一下就编译

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 给 Gradle 权限
        run: chmod +x gradlew

      - name: 开始编译 APK
        run: ./gradlew assembleDebug

      - name: 上传 APK 方便下载
        uses: actions/upload-artifact@v4
        with:
          name: VPNHotspot-APK
          path: app/build/outputs/apk/debug/*.apk
